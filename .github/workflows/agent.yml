name: Run Daily Dashboard Agent

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run agent
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOME_ADDRESS: ${{ secrets.HOME_ADDRESS }}
          WORK_ADDRESS: ${{ secrets.WORK_ADDRESS }}
        run: |
          python commute.py

      - name: Commit and push updates
        run: |
          git config --global user.name "ai-agent"
          git config --global user.email "agent@github.com"

          git pull origin main --rebase || echo "Pull skipped"

          git commit -m "auto update data" || echo "No changes to commit"

          git push origin main